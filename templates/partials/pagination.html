{% if is_paginated %}
<nav class="pager" aria-label="Paginación">
    {% if page_obj.has_previous %}
    <a class="pager__link" href="?page={{ page_obj.previous_page_number }}{% if query %}&amp;q={{ query|urlencode }}{% endif %}">&larr; Anterior</a>
    {% endif %}
    <span class="pager__status t-mono">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a class="pager__link" href="?page={{ page_obj.next_page_number }}{% if query %}&amp;q={{ query|urlencode }}{% endif %}">Siguiente &rarr;</a>
    {% endif %}
</nav>
{% endif %}
